server:
  port: 8080

spring:
  application:
    name: rag-gateway
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
        # 允许配置中心连接失败时继续启动
        fail-fast: false
  config:
    import:
      - optional:nacos:rag-gateway-dev.yml?refresh=true
